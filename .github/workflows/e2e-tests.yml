name: E2E Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      proxy_endpoint:
        description: 'Proxy endpoint URL (e.g. http://s3proxy.default.svc:8080)'
        required: true
        type: string
      stability_rounds:
        description: 'Number of stability test rounds'
        required: false
        default: '50'
        type: string
      concurrency:
        description: 'Concurrency level for parallel tests'
        required: false
        default: '10'
        type: string

jobs:
  functional:
    name: Functional Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: e2e_tests/go.sum

      - name: Run Functional Tests
        working-directory: e2e_tests
        env:
          PROXY_ENDPOINT: ${{ inputs.proxy_endpoint }}
          GCS_HMAC_ACCESS: ${{ secrets.GCS_HMAC_ACCESS }}
          GCS_HMAC_SECRET: ${{ secrets.GCS_HMAC_SECRET }}
          TEST_BUCKET: ${{ secrets.TEST_BUCKET }}
          TEST_PREFIX: "e2e-${{ github.run_id }}/"
        run: |
          go test -v -count=1 -timeout 10m \
            -run 'TestObjectCRUD|TestMultipartUpload|TestStorageClass|TestListObjects|TestVersioning|TestLifecycleCRUD|TestCORSCRUD|TestLoggingCRUD|TestWebsiteCRUD|TestTaggingCRUD|TestHealthEndpoint|TestReadyzEndpoint|TestMetricsEndpoint' \
            ./...

  stability:
    name: Stability Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: functional
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: e2e_tests/go.sum

      - name: Run Stability Tests
        working-directory: e2e_tests
        env:
          PROXY_ENDPOINT: ${{ inputs.proxy_endpoint }}
          GCS_HMAC_ACCESS: ${{ secrets.GCS_HMAC_ACCESS }}
          GCS_HMAC_SECRET: ${{ secrets.GCS_HMAC_SECRET }}
          TEST_BUCKET: ${{ secrets.TEST_BUCKET }}
          TEST_PREFIX: "e2e-stability-${{ github.run_id }}/"
          STABILITY_ROUNDS: ${{ inputs.stability_rounds }}
          CONCURRENCY: ${{ inputs.concurrency }}
        run: |
          go test -v -count=1 -timeout 30m \
            -run 'TestLongRunningCRUD|TestConcurrentOperations|TestControlPlaneConcurrency' \
            ./...

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: functional
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: e2e_tests/go.sum

      - name: Run Benchmarks
        working-directory: e2e_tests
        env:
          PROXY_ENDPOINT: ${{ inputs.proxy_endpoint }}
          GCS_HMAC_ACCESS: ${{ secrets.GCS_HMAC_ACCESS }}
          GCS_HMAC_SECRET: ${{ secrets.GCS_HMAC_SECRET }}
          TEST_BUCKET: ${{ secrets.TEST_BUCKET }}
          TEST_PREFIX: "e2e-bench-${{ github.run_id }}/"
        run: |
          go test -v -count=1 -timeout 20m \
            -run 'TestBenchmarkSuite' \
            ./...

      - name: Upload Benchmark Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: e2e_tests/benchmark_report.json
          if-no-files-found: warn
