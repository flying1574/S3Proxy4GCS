apiVersion: v1
kind: ConfigMap
metadata:
  name: s3proxy-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  s3proxy.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "title": "S3Proxy4GCS — Traffic & Latency",
      "uid": "s3proxy-main",
      "schemaVersion": 39,
      "refresh": "10s",
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "templating": {"list": []},
      "panels": [
        {
          "id": 1, "type": "timeseries",
          "title": "Request rate by endpoint (req/s)",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(s3proxy_http_requests_total[1m])) by (endpoint)",
            "legendFormat": "{{endpoint}}"
          }],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 2, "type": "timeseries",
          "title": "HTTP status code distribution",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(s3proxy_http_requests_total[1m])) by (status_code)",
            "legendFormat": "{{status_code}}"
          }],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 3, "type": "timeseries",
          "title": "Bytes received (in) rate",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(s3proxy_bytes_received_total[1m])) by (endpoint)",
            "legendFormat": "in • {{endpoint}}"
          }],
          "fieldConfig": {"defaults": {"unit": "Bps"}}
        },
        {
          "id": 4, "type": "timeseries",
          "title": "Bytes sent (out) rate",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(s3proxy_bytes_sent_total[1m])) by (endpoint)",
            "legendFormat": "out • {{endpoint}}"
          }],
          "fieldConfig": {"defaults": {"unit": "Bps"}}
        },
        {
          "id": 5, "type": "stat",
          "title": "Bytes in — Max/Avg/Min (5m)",
          "gridPos": {"h": 5, "w": 8, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "max_over_time(sum(rate(s3proxy_bytes_received_total[1m]))[5m:1m])", "legendFormat": "max"},
            {"expr": "avg_over_time(sum(rate(s3proxy_bytes_received_total[1m]))[5m:1m])", "legendFormat": "avg"},
            {"expr": "min_over_time(sum(rate(s3proxy_bytes_received_total[1m]))[5m:1m])", "legendFormat": "min"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 6, "type": "stat",
          "title": "Bytes out — Max/Avg/Min (5m)",
          "gridPos": {"h": 5, "w": 8, "x": 8, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "max_over_time(sum(rate(s3proxy_bytes_sent_total[1m]))[5m:1m])", "legendFormat": "max"},
            {"expr": "avg_over_time(sum(rate(s3proxy_bytes_sent_total[1m]))[5m:1m])", "legendFormat": "avg"},
            {"expr": "min_over_time(sum(rate(s3proxy_bytes_sent_total[1m]))[5m:1m])", "legendFormat": "min"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 7, "type": "stat",
          "title": "Request rate (total / 5m)",
          "gridPos": {"h": 5, "w": 8, "x": 16, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "max_over_time(sum(rate(s3proxy_http_requests_total[1m]))[5m:1m])", "legendFormat": "max"},
            {"expr": "avg_over_time(sum(rate(s3proxy_http_requests_total[1m]))[5m:1m])", "legendFormat": "avg"},
            {"expr": "min_over_time(sum(rate(s3proxy_http_requests_total[1m]))[5m:1m])", "legendFormat": "min"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 8, "type": "timeseries",
          "title": "Request latency (P50 / P95 / P99)",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 19},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.5, sum(rate(s3proxy_http_request_duration_seconds_bucket[1m])) by (le, endpoint))", "legendFormat": "P50 • {{endpoint}}"},
            {"expr": "histogram_quantile(0.95, sum(rate(s3proxy_http_request_duration_seconds_bucket[1m])) by (le, endpoint))", "legendFormat": "P95 • {{endpoint}}"},
            {"expr": "histogram_quantile(0.99, sum(rate(s3proxy_http_request_duration_seconds_bucket[1m])) by (le, endpoint))", "legendFormat": "P99 • {{endpoint}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 9, "type": "heatmap",
          "title": "Request body size heatmap",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 19},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(s3proxy_request_size_bytes_bucket[1m])) by (le)",
            "format": "heatmap",
            "legendFormat": "{{le}}"
          }],
          "options": {"calculate": false}
        },
        {
          "id": 10, "type": "timeseries",
          "title": "Pod CPU usage",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"s3proxy-e2e\", pod=~\"s3proxy-.*\", container!=\"POD\", container!=\"\"}[1m])) by (pod)",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 11, "type": "timeseries",
          "title": "Pod memory (working set)",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 27},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace=\"s3proxy-e2e\", pod=~\"s3proxy-.*\", container!=\"POD\", container!=\"\"}) by (pod)",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 12, "type": "timeseries",
          "title": "Pod network RX/TX (node-exporter via pod NIC)",
          "gridPos": {"h": 7, "w": 24, "x": 0, "y": 34},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(container_network_receive_bytes_total{namespace=\"s3proxy-e2e\", pod=~\"s3proxy-.*\"}[1m])) by (pod)", "legendFormat": "rx • {{pod}}"},
            {"expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"s3proxy-e2e\", pod=~\"s3proxy-.*\"}[1m])) by (pod)", "legendFormat": "tx • {{pod}}"}
          ],
          "fieldConfig": {"defaults": {"unit": "Bps"}}
        }
      ]
    }
