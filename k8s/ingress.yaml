apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: s3proxy-internal
  namespace: s3proxy-e2e
  annotations:
    kubernetes.io/ingress.regional-static-ip-name: "s3proxy-ilb-vip-reserved"
    kubernetes.io/ingress.class: gce-internal
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
    - host: s3proxy.lb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: s3proxy
                port:
                  number: 8080
