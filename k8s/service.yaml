apiVersion: v1
kind: Service
metadata:
  name: s3proxy
  namespace: s3proxy-e2e
  labels:
    app: s3proxy
  annotations:
    cloud.google.com/backend-config: '{"default":"s3proxy-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: s3proxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
